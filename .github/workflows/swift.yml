name: Swift Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and run Swift package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run
        run: swift run
